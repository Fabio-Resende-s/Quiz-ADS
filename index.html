<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz ADS - Fábio Resende</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <h1>📚 Quiz ADS</h1>
    <h2>Escolha uma matéria</h2>

    <div class="materias">
      <button onclick="abrirMateria('redes')">🌐 Fundamentos de Redes de Computadores</button>
      <button onclick="abrirMateria('programacao')">💻 Introdução à Programação de Computadores</button>
    </div>

    <!-- Área do quiz -->
    <div id="quiz-area" style="display: none;">
      <h2 id="nome-materia"></h2>
      <div id="contador"></div>
      <div class="pergunta" id="pergunta"></div>
      <div id="opcoes"></div>
      <div id="resultado">
        <h3 id="mensagem"></h3>
        <p id="explicacao"></p>
      </div>
      <div class="botoes-acoes">
        <button onclick="proximaPergunta()">➡️ Próxima</button>
        <button onclick="voltarMenu()" class="voltar">🔙 Voltar</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
