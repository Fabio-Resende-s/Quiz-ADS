<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz ADS - Fábio Resende</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container" id="app">

  <!-- Cabeçalho -->
  <div class="header">
    <h1>📚 <span>Quiz</span> ADS Fábio Resende</h1>
    <button class="btn-voltar hidden" id="btnVoltar">← Voltar para matérias</button>
  </div>

  <!-- Seção de matérias (página inicial) -->
  <div id="materiasSection">
    <div class="materias-grid" id="materiasGrid"></div>
  </div>

  <!-- Área do quiz (dinâmica) -->
  <div class="quiz-area" id="quizArea">
    <div class="materia-tag" id="materiaTag">Matéria</div>
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
      <span class="progresso" id="progressoTag">1 / 1</span>
    </div>
    <div class="pergunta-texto" id="perguntaTexto">Carregando pergunta...</div>
    <div class="opcoes" id="opcoesContainer"></div>
    <div class="resultado" id="resultado">
      <h3 id="resultadoTitulo"></h3>
      <p id="resultadoTexto"></p>
      <div class="explicacao" id="explicacaoTexto"></div>
    </div>
    <div class="botoes-navegacao">
      <div class="grupo-esquerda">
        <button class="btn" id="btnAnterior" disabled>◀ Anterior</button>
        <button class="btn" id="btnProxima">Próxima ▶</button>
      </div>
      <div>
        <button class="btn btn-verificar" id="btnVerificar">Verificar</button>
        <button class="btn btn-finalizar" id="btnFinalizar">📊 Finalizar</button>
      </div>
    </div>
    <div id="resultadoFinalContainer"></div>
  </div>

  <div class="footer">Clique em uma matéria para iniciar os exercícios.</div>
</div>

<script src="script.js"></script>

</body>
</html>
