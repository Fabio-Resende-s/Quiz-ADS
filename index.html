<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz ADS - Fábio Resende</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <h1>📚 Quiz ADS</h1>
    <h2>Escolha uma matéria</h2>

    <div class="materias">
      <button onclick="abrirMateria('redes')">🌐 Fundamentos de Redes de Computadores</button>
      <button onclick="abrirMateria('programacao')">💻 Introdução à Programação de Computadores</button>
      <button onclick="abrirMateria('matematica-logica')">🧮 Matemática e Lógica</button>
    </div>

    <!-- ========================================================== -->
    <!-- ÁREA DO QUIZ (APENAS UMA VEZ!) -->
    <!-- ========================================================== -->
    <div id="quiz-area" style="display: none;">

      <!-- CABEÇALHO -->
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <button onclick="voltarMenu()" class="btn-voltar">← Voltar</button>
        <span id="nome-materia" style="font-weight:bold; font-size:18px;"></span>
        <span id="contador" style="font-weight:bold; color:#f5e56b;"></span>
      </div>

      <!-- PERGUNTA PRINCIPAL -->
      <p id="pergunta" style="font-size:18px; font-weight:bold; margin-bottom:15px;"></p>

      <!-- IMAGEM (se houver) -->
      <div id="imagem-container" style="display:none; text-align:center; margin:10px 0;"></div>

      <!-- PERGUNTA 2 (texto após a imagem) -->
      <p id="pergunta2" style="display:none; font-size:18px; font-weight:bold; margin-top:10px;"></p>

      <!-- OPÇÕES -->
      <div id="opcoes" style="display:flex; flex-direction:column; gap:10px; margin-top:15px;"></div>

      <!-- BOTÃO PRÓXIMA / PULAR (SEMPRE VISÍVEL) -->
      <div style="margin-top:20px; text-align:center;">
        <button onclick="proximaPergunta()" id="btn-proxima" class="btn-proxima">
          ⏭️ Pular / Próxima
        </button>
      </div>

      <!-- RESULTADO (aparece depois de responder) -->
      <div id="resultado" style="display:none; margin-top:20px; padding:15px; background-color:#1e2a3a; border-radius:10px;">
        <p id="mensagem" style="font-weight:bold; font-size:18px;"></p>
        <p id="explicacao" style="color:#b0c4de; margin-top:10px;"></p>
      </div>

    </div>
    <!-- ========================================================== -->

  </div>

  <script src="script.js"></script>

</body>
</html>
